openapi: 3.0.3
info:
  title: Query Visualization Service API
  version: 1.0.0
  description: Dashboard y consultas agregadas — VetCare System
servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /dashboard/summary:
    get:
      summary: Resumen general del sistema (veterinario y administrador)
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumen del sistema
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      total_users:
                        type: integer
                      total_pets:
                        type: integer
                      total_records:
                        type: integer
                      total_vaccinations:
                        type: integer
                      pending_reminders:
                        type: integer
                      overdue_reminders:
                        type: integer
                  recent_records:
                    type: array
                    items:
                      type: object
        '403':
          description: Solo veterinario o administrador

  /dashboard/pets:
    get:
      summary: Reporte de mascotas con estadísticas
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de mascotas con conteos agregados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    species:
                      type: string
                    owner_name:
                      type: string
                    total_records:
                      type: integer
                    total_vaccinations:
                      type: integer
                    pending_reminders:
                      type: integer
                    last_visit:
                      type: string
                      format: date-time

  /dashboard/{petId}:
    get:
      summary: Dashboard completo de una mascota
      tags: [Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dashboard de la mascota
          content:
            application/json:
              schema:
                type: object
                properties:
                  pet:
                    type: object
                  summary:
                    type: object
                    properties:
                      total_records:
                        type: integer
                      total_vaccinations:
                        type: integer
                      pending_reminders:
                        type: integer
                      overdue_reminders:
                        type: integer
                  recent_records:
                    type: array
                    items:
                      type: object
                  vaccinations:
                    type: array
                    items:
                      type: object
                  reminders:
                    type: array
                    items:
                      type: object
        '403':
          description: No tienes acceso al historial de esta mascota
        '404':
          description: Mascota no encontrada
