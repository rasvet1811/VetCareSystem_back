openapi: 3.0.3
info:
  title: Notification Service API
  version: 1.0.0
  description: Notificaciones multicanal — VetCare System
servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [email, push, sms]
        subject:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [pending, sent, failed]
        sent_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

paths:
  /notifications/send:
    post:
      summary: Enviar notificación multicanal
      tags: [Notifications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                user_id:
                  type: string
                  format: uuid
                channel:
                  type: string
                  enum: [email, push, sms]
                  default: email
                subject:
                  type: string
                message:
                  type: string
                to_email:
                  type: string
                  format: email
      responses:
        '201':
          description: Notificación enviada
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: '#/components/schemas/Notification'
                  delivery:
                    type: object
                    properties:
                      channel:
                        type: string
                      status:
                        type: string
                      sent_at:
                        type: string
        '400':
          description: Datos inválidos
        '401':
          description: Token inválido o ausente

  /notifications:
    get:
      summary: Listar notificaciones
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de notificaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          description: Token inválido o ausente
